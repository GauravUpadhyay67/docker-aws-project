name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Test
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high || true

      - name: Run tests
        run: npm test


  # Job 2: Build Docker image (only if tests pass)
  build:
    runs-on: ubuntu-latest
    needs: test  # ← Only runs if 'test' job passes!
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-manager:latest .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'task-manager:latest'
          exit-code: '0'   # Don't fail on vulnerabilities yet (learning mode)
          severity: 'CRITICAL,HIGH'

  # Job 3: Deploy to AWS EC2 (only after build passes and EC2 secrets exist)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && secrets.EC2_HOST != '' }}
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main
            docker stop task-manager || true
            docker rm task-manager || true
            docker build -t task-manager:latest .
            docker run -d -p 80:3000 --name task-manager task-manager:latest
            echo "✅ Deployed successfully!"

